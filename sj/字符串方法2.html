<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var hello="hello world!";
        console.log(hello.indexOf("world"));
        console.log(hello.indexOf("w",7));
    // 从第7个开始往后找
        var name =" huang zi han ";
        console.log(name.trim());
        // 只能去头尾不能去中间
        console.log(name.trimStart());/*头部*/
        console.log(name.trimEnd());/*尾部*/
        console.log(name.concat(hello));
     </script>
</body>
</html>
